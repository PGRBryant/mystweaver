# Local development environment: Firestore emulator + API server
# Cache is in-memory (LRU) — no Redis needed.
# Usage:
#   docker-compose up -d            # start Firestore emulator
#   docker-compose --profile api up # also start the API in Docker

services:

  # ── Firestore emulator ─────────────────────────────────────────────────────
  firestore:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    container_name: mystweaver-firestore
    command: >
      gcloud beta emulators firestore start
        --host-port=0.0.0.0:8080
        --project=mystweaver-local
    ports:
      - '8080:8080'
    environment:
      CLOUDSDK_CORE_PROJECT: mystweaver-local
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8080']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── API server (optional; prefer running with `npm run dev` on the host) ───
  api:
    profiles: ['api']
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mystweaver-api
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: '3000'
      FIRESTORE_EMULATOR_HOST: firestore:8080
      GOOGLE_CLOUD_PROJECT: mystweaver-local
    depends_on:
      firestore:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://localhost:3000/health']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

networks:
  default:
    name: mystweaver-network
