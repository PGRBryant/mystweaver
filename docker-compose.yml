version: '3.8'

services:
  # Firestore Emulator for local development
  firestore:
    image: google/cloud-firestore-emulator:latest
    container_name: labrats-firestore
    ports:
      - '8080:8080'  # Firestore API
      - '4000:4000'  # Firestore UI
    environment:
      - FIRESTORE_PROJECT_ID=labrats-local
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080']
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - /opt/firestore-emulator/bin/firestore-emulator
      - --host=0.0.0.0
      - --port=8080
    volumes:
      - firestore-data:/data

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: labrats-redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

  # API Server (optional - can run from host for development)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labrats-api
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: '3000'
      FIRESTORE_EMULATOR_HOST: firestore:8080
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      API_KEY_HEADER: 'X-API-Key'
    depends_on:
      firestore:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/sdk-js/dist:/app/packages/sdk-js/dist

volumes:
  firestore-data:
  redis-data:

networks:
  default:
    name: labrats-network
