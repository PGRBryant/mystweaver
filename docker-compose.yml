version: '3.8'

# Local development environment: Firestore emulator + Redis + API server
# Usage:
#   docker-compose up -d            # start background services only
#   docker-compose --profile api up # also start the API in Docker

services:

  # ── Firestore emulator ─────────────────────────────────────────────────────
  firestore:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    container_name: mystweaver-firestore
    command: >
      gcloud beta emulators firestore start
        --host-port=0.0.0.0:8080
        --project=mystweaver-local
    ports:
      - '8080:8080'
    environment:
      CLOUDSDK_CORE_PROJECT: mystweaver-local
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8080']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mystweaver-redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

  # ── API server (optional; prefer running with `npm run dev` on the host) ───
  api:
    profiles: ['api']
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mystweaver-api
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: '3000'
      FIRESTORE_EMULATOR_HOST: firestore:8080
      GOOGLE_CLOUD_PROJECT: mystweaver-local
      REDIS_HOST: redis
      REDIS_PORT: '6379'
    depends_on:
      firestore:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://localhost:3000/health']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  redis-data:

networks:
  default:
    name: mystweaver-network
