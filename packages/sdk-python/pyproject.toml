[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "labrats-sdk"
version = "0.1.0"
description = "Python SDK for the Labrats feature flag service"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.8"
keywords = ["feature-flags", "feature-toggles", "labrats"]
dependencies = [
  "httpx>=0.25.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=7.4.0",
  "pytest-asyncio>=0.23.0",
  "pytest-httpx>=0.26.0",
  "mypy>=1.7.0",
  "ruff>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/yourusername/labrats"
Repository = "https://github.com/yourusername/labrats"
"Bug Tracker" = "https://github.com/yourusername/labrats/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/labrats"]

[tool.ruff]
target-version = "py38"
line-length = 100
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.8"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
